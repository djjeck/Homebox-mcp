# Docker Compose configuration for QNAP Container Station
# This version PULLS a pre-built image from GitHub Container Registry
#
# IMPORTANT: Edit the environment variables below with your Homebox credentials
# and update the network name to match your Homebox container's network

version: '3.8'

services:
  homebox-mcp:
    # Pull the pre-built image from GitHub Container Registry
    image: ghcr.io/jeeves5454/homebox-mcp:latest
    container_name: homebox-mcp-server
    restart: unless-stopped

    # CONFIGURE THESE ENVIRONMENT VARIABLES
    environment:
      # URL to your Homebox container
      # Use the container name (usually 'homebox') or container IP
      - HOMEBOX_URL=http://homebox:7745

      # Your Homebox login credentials
      - HOMEBOX_EMAIL=your-email@example.com
      - HOMEBOX_PASSWORD=your-password

    # NETWORK CONFIGURATION
    # This MUST match your Homebox container's network
    # To find it:
    # 1. Go to Container Station
    # 2. Click on your Homebox container
    # 3. Check the "Network" section
    # 4. Replace the network name below
    networks:
      - qnet-static-eth0-xxxxxx

# Network configuration
# Use the same network as your Homebox container
networks:
  qnet-static-eth0-xxxxxx:
    external: true

# INSTRUCTIONS:
# 1. Replace 'your-email@example.com' with your Homebox email
# 2. Replace 'your-password' with your Homebox password
# 3. Replace 'qnet-static-eth0-xxxxxx' with your actual network name (2 places)
# 4. Save this file
# 5. In Container Station, click "Create" -> "Create Application"
# 6. Paste the contents of this file
# 7. Click "Create"
#
# To update to a new version:
# - In Container Station, stop the container
# - Click "Pull" to get the latest image
# - Restart the container
