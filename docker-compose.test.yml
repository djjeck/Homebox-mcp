# Test stack for `npm run test:e2e`. Managed automatically by src/test-e2e.ts —
# do not bring up manually.
services:
  homebox:
    image: ghcr.io/sysadminsmedia/homebox:${HOMEBOX_VERSION:-0.25.0}
    environment:
      - HBOX_LOG_LEVEL=warn
      - HBOX_OPTIONS_ALLOW_REGISTRATION=true
    ports:
      - "7745:7745"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:7745/api/v1/status"]
      interval: 2s
      timeout: 5s
      retries: 15
      start_period: 5s

  homebox-mcp:
    build: .
    environment:
      - HOMEBOX_URL=http://homebox:7745
      - HOMEBOX_EMAIL=test@homebox-mcp.test
      - HOMEBOX_PASSWORD=TestPassword123!
      - PORT=8811
    ports:
      - "8811:8811"
    depends_on:
      homebox:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8811/health"]
      interval: 2s
      timeout: 5s
      retries: 20
      start_period: 10s
