version: '3.8'

services:
  homebox-mcp:
    build: .
    container_name: homebox-mcp-server
    restart: unless-stopped

    # Option 1: Use environment variables (recommended for Docker)
    environment:
      - HOMEBOX_URL=http://homebox:7745
      - HOMEBOX_EMAIL=your-email@example.com
      - HOMEBOX_PASSWORD=your-password
      - PORT=8811
      # Optional: enables get_item_attachment by setting the public base URL for attachment downloads.
      # Use a path or subdomain distinct from the MCP endpoint so your reverse proxy can route
      # attachment traffic independently (e.g. /homebox-mcp-attachments → container /items/…).
      #   Direct:         ATTACHMENT_BASE_URL=http://192.168.1.10:8811
      #   Reverse proxy:  ATTACHMENT_BASE_URL=https://myhost.example.com/homebox-mcp-attachments
      # - ATTACHMENT_BASE_URL=https://your-host-or-tunnel-url/homebox-mcp-attachments

    # Option 2: Use a config file (uncomment if preferred)
    # volumes:
    #   - ./config.json:/config/config.json:ro

    # Connect to the same network as Homebox
    # If your Homebox container is on a different network, adjust accordingly
    networks:
      - homebox-network

    # Expose the HTTP/SSE port for claude.ai and other HTTP-based MCP clients
    ports:
      - "8811:8811"

# If Homebox is in a separate docker-compose, you can reference its network
networks:
  homebox-network:
    external: true
    # If the network doesn't exist yet, use this instead:
    # driver: bridge
